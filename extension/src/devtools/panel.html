<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gaze Panel</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0d0e11;
        color: #e8eaf0;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #header {
        padding: 12px 16px;
        border-bottom: 1px solid #2a2d38;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #wordmark { color: #ff4757; font-weight: 700; font-size: 14px; letter-spacing: 0.1em; }
      #status { font-size: 11px; color: #545870; }
      #findings { flex: 1; overflow-y: auto; padding: 8px 0; }
      .finding { padding: 8px 16px; border-bottom: 1px solid #1a1d24; display: flex; gap: 10px; align-items: flex-start; }
      .dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
      .critical { background: #ff4757; }
      .high     { background: #ff6b35; }
      .medium   { background: #ffd32a; }
      .low      { background: #2ed573; }
      .info     { background: #5352ed; }
      .finding-title { font-size: 12px; color: #e8eaf0; }
      .finding-meta  { font-size: 10px; color: #545870; margin-top: 2px; }
      #empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #545870; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="header">
      <span id="wordmark">GAZE</span>
      <span id="status">Ready — trigger a scan from Claude</span>
    </div>
    <div id="findings">
      <div id="empty">No findings yet</div>
    </div>
    <script type="module" src="../panel.js"></script>
  </body>
</html>
